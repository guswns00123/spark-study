# ============================================================
# Apache Spark 학습 클러스터 (master 1 + worker 2 + Jupyter)
# 이미지: bitnamilegacy/spark:3.5
#   - 2025년 Bitnami가 무료 이미지를 bitnamilegacy/* 네임스페이스로 이전
#   - non-root 설계 + 환경변수 기반 설정으로 학습 환경에 적합
# Jupyter: quay.io/jupyter/pyspark-notebook (공식 jupyter는 quay.io로 이전)
# ============================================================

# 프로젝트 이름을 명시 (폴더명이 한글이면 Compose가 빈 문자열로 인식하여 에러)
name: spark-study

networks:
  spark-net:
    # 컨테이너끼리 hostname으로 직접 통신할 수 있도록 bridge 네트워크 사용
    driver: bridge

volumes:
  # Jupyter가 노트북을 저장할 named volume (컨테이너 삭제해도 노트북 유지)
  jupyter-notebooks:
  # 학습용 data 디렉토리도 named volume으로 관리.
  # Windows bind mount는 Hadoop의 깊은 _temporary mkdir에 약해서 Parquet 쓰기 실패.
  # named volume은 WSL2 내부 Linux FS에 저장되어 mkdir이 안정적이며 모든 컨테이너에 공유됨.
  spark-data:
  # Spark 이벤트 로그 저장 (History Server가 18080에서 과거 application 분석에 사용).
  # bind mount 대신 named volume — 호스트 가상화 레이어 이슈 회피.
  spark-events:

services:

  # ----------------------------------------------------------
  # Spark Data Volume Init
  # spark-data / spark-events named volume 의 디렉토리 권한을 777로 설정해서
  # spark user(UID 1000)인 driver/executor 가 Parquet write 및
  # EventLog write 가능하도록 한다.
  # 한 번 실행 후 종료되는 단발 init 컨테이너.
  # ----------------------------------------------------------
  spark-data-init:
    image: bitnamilegacy/spark:3.5
    container_name: spark-data-init
    user: "0"
    command: sh -c "chmod -R 777 /opt/bitnami/spark/data && chmod -R 777 /opt/bitnami/spark/spark-events"
    volumes:
      - spark-data:/opt/bitnami/spark/data
      - spark-events:/opt/bitnami/spark/spark-events
    restart: "no"

  # ----------------------------------------------------------
  # Spark Master
  # ----------------------------------------------------------
  spark-master:
    image: bitnamilegacy/spark:3.5
    container_name: spark-master
    hostname: spark-master          # worker가 이 hostname으로 master를 찾는다
    user: "0"                       # root로 실행: bitnamilegacy 이미지는 기본 UID 1001이
                                    # /etc/passwd에 없어서 Hadoop UGI login이 NPE를 던짐
    environment:
      - SPARK_MODE=master           # bitnami 이미지: 이 변수로 master/worker 역할 구분
      - SPARK_RPC_AUTHENTICATION_ENABLED=no   # 학습 환경 → 인증 비활성화(운영 시엔 켤 것)
      - SPARK_RPC_ENCRYPTION_ENABLED=no       # 학습 환경 → 암호화 비활성화
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_DAEMON_MEMORY=1g      # Master 데몬 자체에 할당할 메모리 (JVM heap)
      - HADOOP_USER_NAME=spark      # 컨테이너 UID 1001이 /etc/passwd에 없어 Hadoop login NPE 방지
    ports:
      - "8080:8080"   # Spark Web UI (Master): 브라우저에서 http://localhost:8080
      - "7077:7077"   # Spark Master 포트: worker/driver가 연결하는 내부 포트
      - "4040:4040"   # Spark Application UI: job 실행 중 http://localhost:4040
    volumes:
      - spark-data:/opt/bitnami/spark/data     # named volume (Windows mkdir 이슈 우회)
      - ./jobs:/opt/bitnami/spark/jobs         # Spark job 파일 공유
      - ./examples:/opt/bitnami/spark/examples/local  # 예제 코드 공유
      - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf  # 공통 설정
      - spark-events:/opt/bitnami/spark/spark-events  # 이벤트 로그 공유 (history server와 동일 경로)
    networks:
      - spark-net
    depends_on:
      spark-data-init:
        condition: service_completed_successfully
    restart: unless-stopped         # Docker 재시작 시 자동으로 컨테이너도 재시작

  # ----------------------------------------------------------
  # Spark Worker 1
  # ----------------------------------------------------------
  spark-worker-1:
    image: bitnamilegacy/spark:3.5
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: "0"                       # master와 동일한 사유로 root 실행
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077  # master hostname 지정
      - SPARK_WORKER_MEMORY=2G      # 이 worker에 job이 사용할 수 있는 최대 메모리
      - SPARK_WORKER_CORES=2        # 이 worker가 제공할 CPU 코어 수
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_DAEMON_MEMORY=512m    # Worker 데몬 자체 메모리 (executor와 별개)
      - HADOOP_USER_NAME=spark      # Hadoop FileSystem login NPE 방지
    volumes:
      - spark-data:/opt/bitnami/spark/data
      - ./jobs:/opt/bitnami/spark/jobs
      - ./examples:/opt/bitnami/spark/examples/local
      - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
      - spark-events:/opt/bitnami/spark/spark-events  # 이벤트 로그 공유
    networks:
      - spark-net
    depends_on:
      spark-master:
        condition: service_started  # master가 먼저 뜬 후 worker가 등록
      spark-data-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # Spark Worker 2
  # ----------------------------------------------------------
  spark-worker-2:
    image: bitnamilegacy/spark:3.5
    container_name: spark-worker-2
    hostname: spark-worker-2
    user: "0"                       # master와 동일한 사유로 root 실행
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_DAEMON_MEMORY=512m
    volumes:
      - spark-data:/opt/bitnami/spark/data
      - ./jobs:/opt/bitnami/spark/jobs
      - ./examples:/opt/bitnami/spark/examples/local
      - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
      - spark-events:/opt/bitnami/spark/spark-events  # 이벤트 로그 공유
    networks:
      - spark-net
    depends_on:
      spark-master:
        condition: service_started
      spark-data-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # Spark History Server
  # 잡이 끝난 뒤에도 DAG / Stages / Tasks / SQL plan을 분석할 수 있도록
  # spark.eventLog가 기록한 로그를 읽어 18080 포트에서 UI를 제공한다.
  # ----------------------------------------------------------
  spark-history:
    image: bitnamilegacy/spark:3.5
    container_name: spark-history
    hostname: spark-history
    user: "0"                       # master/worker와 동일한 사유로 root 실행
    # bitnamilegacy/spark 이미지는 SPARK_MODE=history-server를 지원하지 않는다.
    # entrypoint override 없이 command로 start-history-server.sh를 직접 호출.
    command: >
      bash -c "
        mkdir -p /opt/bitnami/spark/spark-events &&
        /opt/bitnami/spark/sbin/start-history-server.sh &&
        tail -f /opt/bitnami/spark/logs/*.out 2>/dev/null || tail -f /dev/null
      "
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=file:///opt/bitnami/spark/spark-events -Dspark.history.ui.port=18080
      - SPARK_NO_DAEMONIZE=false
      - HADOOP_USER_NAME=spark
      - SPARK_DAEMON_MEMORY=512m
    ports:
      - "18080:18080"  # History Server UI: 잡 종료 후 http://localhost:18080 에서 조회
    volumes:
      - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
      - spark-events:/opt/bitnami/spark/spark-events  # master/worker와 동일한 named volume
    networks:
      - spark-net
    depends_on:
      - spark-master
    restart: unless-stopped

  # ----------------------------------------------------------
  # Jupyter Notebook (PySpark 학습용)
  # jupyter/pyspark-notebook: Spark + Python 환경이 모두 내장된 공식 이미지
  # ----------------------------------------------------------
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: spark-jupyter
    environment:
      - JUPYTER_ENABLE_LAB=yes      # JupyterLab UI 활성화 (기존 Notebook보다 기능 풍부)
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      # Jupyter에서 pyspark 실행 시 자동으로 외부 클러스터에 연결하도록 설정
      - SPARK_MASTER=spark://spark-master:7077
      - HADOOP_USER_NAME=spark      # Hadoop FileSystem login NPE 방지
    ports:
      - "8888:8888"   # Jupyter Lab UI: 브라우저에서 http://localhost:8888
    volumes:
      - jupyter-notebooks:/home/jovyan/work   # 노트북 저장 (named volume → 영구 보존)
      - spark-data:/home/jovyan/work/data     # Spark 클러스터와 같은 named volume 공유
      - ./examples:/home/jovyan/work/examples # 예제 코드 직접 열어볼 수 있도록
      - ./jobs:/home/jovyan/work/jobs
    networks:
      - spark-net
    depends_on:
      - spark-master
    restart: unless-stopped
