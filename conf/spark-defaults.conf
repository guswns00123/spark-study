# ============================================================
# spark-defaults.conf  --  학습 클러스터 공통 설정
# 이 파일은 master/worker 컨테이너 모두에 마운트된다.
# spark-submit / pyspark 실행 시 자동으로 읽힌다.
# ============================================================

# ------ 마스터 접속 주소 ------
# Docker 네트워크 내부 hostname으로 지정 (컨테이너끼리만 쓰는 주소)
spark.master                        spark://spark-master:7077

# ------ Executor 메모리 / 코어 ------
# 학습용: executor 1개당 1GB. worker 메모리(2GB) 중 절반만 써서 OOM 예방
spark.executor.memory               1g

# executor 1개가 쓸 코어 수. worker 2코어 중 1코어만 써서 여러 job 동시 실행 가능
spark.executor.cores                1

# driver(= 우리가 실행하는 Python 프로세스)에 줄 메모리
# verify-cluster.py나 pyspark shell 실행 시 이 값이 사용된다
spark.driver.memory                 1g

# ------ 직렬화 ------
# KryoSerializer: Java 기본 직렬화보다 2~10배 빠름. 학습 단계부터 좋은 습관으로 설정
spark.serializer                    org.apache.spark.serializer.KryoSerializer

# ------ UI ------
# Spark Application UI 포트 (docker-compose에서 4040 포트를 열어둔 이유)
spark.ui.port                       4040

# ------ Event Log (History Server 연동) ------
# 잡이 끝난 뒤에도 DAG / Stages / Tasks / SQL plan을 분석하려면 이벤트 로그가 필요하다.
# History Server(포트 18080)가 이 디렉토리를 읽어 과거 application UI를 제공한다.
spark.eventLog.enabled              true
spark.eventLog.dir                  file:///opt/bitnami/spark/spark-events
spark.history.fs.logDirectory       file:///opt/bitnami/spark/spark-events

# ------ Shuffle ------
# partition 수. 학습용 소규모 데이터에 맞게 작게 설정 (기본값 200은 너무 큼)
spark.sql.shuffle.partitions        4

# ------ 네트워크 타임아웃 ------
# Docker 환경에서 컨테이너 간 통신 지연 허용치를 넉넉히 설정 (기본 120s)
spark.network.timeout               300s

# ------ Ivy/Maven 의존성 캐시 경로 ------
# Bitnami 컨테이너는 non-root(UID 1001)로 실행되며 HOME이 명확치 않아
# 기본값(~/.ivy2)이 "?/.ivy2"로 해석되어 spark-submit이 실패한다.
# 절대경로로 명시해서 우회한다.
spark.jars.ivy                      /tmp/.ivy2
spark.driver.extraJavaOptions       -Duser.home=/tmp
spark.executor.extraJavaOptions     -Duser.home=/tmp

# ------ FileOutputCommitter 알고리즘 v2 ------
# v1(기본): _temporary/0/_temporary/attempt_xxx 식으로 깊게 중첩된 임시 디렉토리를 만든다.
# v2: 임시 파일을 task 종료 즉시 최종 위치로 rename. 중첩이 얕고 훨씬 안정적.
spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version  2

# ------ ChecksumFileSystem 비활성화 (RawLocalFileSystem 사용) ------
# 기본값 ChecksumFileSystem은 모든 파일마다 .crc 체크섬 파일을 추가로 생성한다.
# 4 파티션 × (data + crc) = 8개 파일 + 깊은 임시 디렉토리 = Docker Desktop on Windows의
# 가상화 레이어에서 mkdir 폭주로 실패. Raw로 바꾸면 파일/디렉토리 수가 절반으로 줄어든다.
spark.hadoop.fs.file.impl                          org.apache.hadoop.fs.RawLocalFileSystem

# ------ 동적 할당 (학습 환경에서는 비활성화 권장) ------
# 활성화하면 executor가 자동으로 늘었다 줄었다 해서 학습 시 혼란스러울 수 있음
spark.dynamicAllocation.enabled     false

# ------ 로그 레벨 ------
# WARN으로 설정해 콘솔이 INFO 로그로 가득 차는 것을 방지 (학습 시 가독성 향상)
spark.logConf                       true
